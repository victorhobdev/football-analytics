football_pg:
  target: local
  outputs:
    local:
      type: postgres
      host: "{{ env_var('FOOTBALL_PG_HOST', env_var('POSTGRES_HOST', 'postgres')) }}"
      port: "{{ env_var('FOOTBALL_PG_PORT', env_var('POSTGRES_PORT', '5432')) | int }}"
      user: "{{ env_var('FOOTBALL_PG_USER', env_var('POSTGRES_USER', 'football')) }}"
      pass: "{{ env_var('FOOTBALL_PG_PASSWORD', env_var('POSTGRES_PASSWORD', 'football')) }}"
      dbname: "{{ env_var('FOOTBALL_PG_DBNAME', env_var('POSTGRES_DB', 'football_dw')) }}"
      schema: "{{ env_var('DBT_TARGET_SCHEMA', 'mart') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"

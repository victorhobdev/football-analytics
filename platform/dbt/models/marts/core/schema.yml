version: 2

models:
  - name: dim_team
    description: "Dimensao de times."
    columns:
      - name: team_sk
        description: "Chave substituta da dimensao de times."
        tests:
          - not_null
          - unique
      - name: team_id
        description: "Identificador natural do time vindo da origem."
        tests:
          - not_null
          - unique
      - name: team_name
        description: "Nome oficial do time."
        tests:
          - not_null

  - name: dim_player
    description: "Dimensao de jogadores deduplicada por player_id (cobrindo player_id e assist_player_id)."
    columns:
      - name: player_sk
        description: "Chave substituta da dimensao de jogadores."
        tests:
          - not_null
          - unique
      - name: player_id
        description: "Identificador natural do jogador vindo da origem."
        tests:
          - not_null
          - unique
      - name: player_name
        description: "Nome do jogador."
        tests:
          - not_null
      - name: nationality
        description: "Nacionalidade canônica do jogador quando disponível na origem de identidade."
      - name: updated_at
        description: "Timestamp de atualizacao da dimensao."
        tests:
          - not_null

  - name: dim_competition
    description: "Dimensao de competicoes."
    columns:
      - name: competition_sk
        description: "Chave substituta da dimensao de competicoes."
        tests:
          - not_null
          - unique
      - name: league_id
        description: "Identificador natural da liga."
        tests:
          - not_null
          - unique
      - name: league_name
        description: "Nome da competicao/liga."
        tests:
          - not_null

  - name: dim_venue
    description: "Dimensao de estadios deduplicada deterministicamente por venue_id."
    columns:
      - name: venue_sk
        description: "Chave substituta da dimensao de estadios."
        tests:
          - not_null
          - unique
      - name: venue_id
        description: "Identificador natural do estadio."
        tests:
          - not_null
          - unique
      - name: venue_name
        description: "Nome do estadio."
        tests:
          - not_null
      - name: venue_city
        description: "Cidade do estadio com normalizacao leve (trim/nullif)."
      - name: venue_country
        description: "Pais do estadio com normalizacao leve (trim/nullif)."
      - name: updated_at
        description: "Timestamp de atualizacao da dimensao."
        tests:
          - not_null

  - name: dim_date
    description: "Dimensao de calendario."
    columns:
      - name: date_sk
        description: "Chave substituta da data no formato YYYYMMDD."
        tests:
          - not_null
          - unique
      - name: date_day
        description: "Data calendario."
        tests:
          - not_null
          - unique
      - name: year
        description: "Ano da data."
        tests:
          - not_null
      - name: month
        description: "Mes numerico da data."
        tests:
          - not_null
      - name: day
        description: "Dia do mes."
        tests:
          - not_null
      - name: is_weekend
        description: "Indicador de fim de semana."
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false

  - name: fact_matches
    description: "Fato de partidas no grao de uma partida por linha."
    columns:
      - name: match_id
        description: "Identificador unico da partida (fixture_id)."
        tests:
          - not_null
          - unique
      - name: competition_sk
        description: "Chave substituta da competicao."
        tests:
          - not_null
          - relationships:
              to: ref('dim_competition')
              field: competition_sk
      - name: provider
        description: "Provider canonico da partida."
        tests:
          - not_null
      - name: date_sk
        description: "Chave substituta da data da partida."
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_sk
      - name: home_team_sk
        description: "Chave substituta do time mandante."
        tests:
          - not_null
          - relationships:
              to: ref('dim_team')
              field: team_sk
      - name: away_team_sk
        description: "Chave substituta do time visitante."
        tests:
          - not_null
          - relationships:
              to: ref('dim_team')
              field: team_sk
      - name: venue_sk
        description: "Chave substituta do estadio."
        tests:
          - relationships:
              to: ref('dim_venue')
              field: venue_sk
              where: "venue_sk is not null"
      - name: season
        description: "Temporada da partida."
        tests:
          - not_null
      - name: stage_sk
        description: "Chave substituta da fase da partida quando o provider fornece contexto de stage."
        tests:
          - relationships:
              to: ref('dim_stage')
              field: stage_sk
              where: "stage_sk is not null"
      - name: round_sk
        description: "Chave substituta da rodada da partida quando o provider fornece contexto de round."
        tests:
          - relationships:
              to: ref('dim_round')
              field: round_sk
              where: "round_sk is not null"
      - name: group_id
        description: "Identificador canonico do grupo quando a partida pertence a uma fase com multiplas tabelas paralelas."
        tests:
          - relationships:
              to: ref('dim_group')
              field: group_id
              where: "group_id is not null"
      - name: tie_id
        description: "Identificador canonico do confronto eliminatorio quando a partida pertence a um tie."
        tests:
          - relationships:
              to: ref('dim_tie')
              field: tie_id
              where: "tie_id is not null"
      - name: date_day
        description: "Data da partida."
        tests:
          - not_null
      - name: result
        description: "Resultado final em texto padronizado."
        tests:
          - not_null
          - accepted_values:
              values: ['Home Win', 'Away Win', 'Draw']

  - name: fact_match_events
    description: "Fato de eventos por evento de jogo."
    columns:
      - name: event_id
        description: "Chave tecnica unica do evento."
        tests:
          - not_null
          - unique
      - name: match_id
        description: "Identificador da partida."
        tests:
          - not_null
          - relationships:
              to: ref('fact_matches')
              field: match_id
      - name: team_sk
        description: "Chave substituta do time associado ao evento."
        tests:
          - relationships:
              to: ref('dim_team')
              field: team_sk
              where: "team_sk is not null"
      - name: player_sk
        description: "Chave substituta do jogador associado ao evento."
        tests:
          - relationships:
              to: ref('dim_player')
              field: player_sk
              where: "player_sk is not null"
      - name: assist_player_sk
        description: "Chave substituta do jogador assistente."
        tests:
          - relationships:
              to: ref('dim_player')
              field: player_sk
              where: "assist_player_sk is not null"
      - name: is_goal
        description: "Indicador se o evento representa gol."
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: is_time_elapsed_anomalous
        description: "Flag que indica anomalia de tempo (valor bruto negativo normalizado para NULL)."
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false

  - name: dim_stage
    description: "Dimensao de etapas (stages) de competicao."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - stage_id
    columns:
      - name: stage_sk
        tests:
          - not_null
          - unique
      - name: stage_id
        tests:
          - not_null
      - name: provider
        tests:
          - not_null
      - name: stage_format
        description: "Formato semantico da fase quando conhecido via configuracao de temporada e nome da fase."
      - name: stage_code
        description: "Slug tecnico derivado de stage_name para suporte a mapeamentos auditaveis."

  - name: dim_tie
    description: "Entidade canonica de confrontos eliminatorios derivada do dominio estrutural."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - competition_key
            - season_label
            - stage_id
            - tie_order
    columns:
      - name: tie_sk
        tests:
          - not_null
          - unique
      - name: tie_id
        tests:
          - not_null
          - unique
      - name: winner_team_id
        description: "Time classificado no confronto quando o resultado ja fecha vencedor oficial."
      - name: resolution_type
        description: "Modo de resolucao do confronto: match unico, agregado, extra time, penaltis ou regra estrutural."
      - name: is_inferred
        tests:
          - not_null

  - name: dim_group
    description: "Entidade canonica de grupos derivada de standings scoping por stage."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - competition_key
            - season_label
            - stage_id
            - group_order
    columns:
      - name: group_sk
        tests:
          - not_null
          - unique
      - name: group_id
        tests:
          - not_null
          - unique
      - name: source_group_id
        description: "Identificador bruto do grupo vindo da origem quando disponivel."
      - name: group_name
        tests:
          - not_null
      - name: group_order
        tests:
          - not_null
      - name: is_inferred
        tests:
          - not_null

  - name: fact_tie_results
    description: "Resultados agregados por confronto eliminatorio."
    columns:
      - name: tie_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_tie')
              field: tie_id
      - name: winner_team_id
        tests:
          - not_null
      - name: resolution_type
        tests:
          - not_null
          - accepted_values:
              values: ['aggregate', 'extra_time', 'penalties', 'single_match', 'stage_rule']
      - name: next_stage_id
        description: "Stage estrutural de destino do classificado quando houver fase seguinte."

  - name: competition_structure_hub
    description: "Hub estrutural minimo de competicao-temporada com regras de progressao entre fases."
    columns:
      - name: competition_structure_rule_id
        tests:
          - not_null
          - unique
      - name: from_stage_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_stage')
              field: stage_id
      - name: to_stage_id
        tests:
          - relationships:
              to: ref('dim_stage')
              field: stage_id
              where: "to_stage_id is not null"
      - name: progression_scope
        tests:
          - not_null
      - name: progression_type
        tests:
          - not_null
      - name: is_inferred
        tests:
          - not_null

  - name: fact_stage_progression
    description: "Progressao de times entre fases de uma competicao-temporada."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - competition_key
            - season_label
            - team_id
            - from_stage_id
            - progression_type
            - tie_outcome
            - source_position
    columns:
      - name: stage_progression_id
        tests:
          - not_null
          - unique
      - name: from_stage_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_stage')
              field: stage_id
      - name: to_stage_id
        tests:
          - relationships:
              to: ref('dim_stage')
              field: stage_id
              where: "to_stage_id is not null"
      - name: group_id
        tests:
          - relationships:
              to: ref('dim_group')
              field: group_id
              where: "group_id is not null"
      - name: progression_type
        tests:
          - not_null
          - accepted_values:
              values: ['qualified', 'eliminated', 'repechage']
      - name: is_inferred
        tests:
          - not_null

  - name: dim_round
    description: "Dimensao de rodadas com chave sequêncial por temporada."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - round_id
    columns:
      - name: round_sk
        tests:
          - not_null
          - unique
      - name: round_id
        tests:
          - not_null
      - name: round_key
        tests:
          - not_null
      - name: stage_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_stage')
              field: stage_sk

  - name: dim_coach
    description: "Dimensao de tecnicos."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - coach_id
    columns:
      - name: coach_sk
        tests:
          - not_null
          - unique
      - name: coach_id
        tests:
          - not_null
      - name: provider
        tests:
          - not_null
      - name: coach_name
        tests:
          - not_null
      - name: has_real_photo
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: is_placeholder_image
        tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false

  - name: fact_fixture_lineups
    description: "Fato de lineups no grao provider/fixture/team/lineup (com player conhecido)."
    columns:
      - name: fixture_lineup_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null
          - relationships:
              to: ref('fact_matches')
              field: match_id
      - name: team_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_team')
              field: team_sk
      - name: player_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_player')
              field: player_sk

  - name: fact_fixture_player_stats
    description: "Fato de estatisticas individuais por partida no grao provider/fixture/team/player."
    columns:
      - name: fixture_player_stat_id
        tests:
          - not_null
          - unique
      - name: match_id
        tests:
          - not_null
          - relationships:
              to: ref('fact_matches')
              field: match_id
      - name: team_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_team')
              field: team_sk
      - name: player_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_player')
              field: player_sk

  - name: fact_standings_snapshots
    description: "Snapshots de classificacao por rodada."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - season_id
            - stage_id
            - round_id
            - team_id
    columns:
      - name: standings_snapshot_id
        tests:
          - not_null
          - unique
      - name: group_id
        description: "Identificador canonico do grupo quando o snapshot pertence a uma fase de grupos."
        tests:
          - relationships:
              to: ref('dim_group')
              field: group_id
              where: "group_id is not null"
      - name: group_sk
        description: "Chave substituta do grupo quando o snapshot pertence a uma fase de grupos."
        tests:
          - relationships:
              to: ref('dim_group')
              field: group_sk
              where: "group_sk is not null"
      - name: team_id
        tests:
          - not_null

  - name: fact_group_standings
    description: "Snapshots de classificacao por rodada particionados explicitamente por grupo."
    tests:
      - unique_combination_of_columns:
          combination_of_columns:
            - provider
            - competition_key
            - season_label
            - stage_id
            - group_id
            - round_id
            - team_id
    columns:
      - name: standings_snapshot_id
        tests:
          - not_null
          - unique
      - name: group_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_group')
              field: group_id
      - name: group_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_group')
              field: group_sk
      - name: group_name
        tests:
          - not_null
      - name: group_order
        tests:
          - not_null
      - name: team_id
        tests:
          - not_null

  - name: bridge_statsbomb_match_identity
    description: "Ponte de identidade de partidas StatsBomb para o match canonico local quando resolvido."
    columns:
      - name: bridge_match_identity_sk
        tests:
          - not_null
          - unique
      - name: source_match_id
        tests:
          - not_null
          - unique
      - name: identity_status
        tests:
          - not_null
      - name: local_match_id
        tests:
          - relationships:
              to: ref('fact_matches')
              field: match_id
              where: "local_match_id is not null"

  - name: bridge_statsbomb_team_identity
    description: "Ponte de identidade de times StatsBomb para o time canonico local quando resolvido."
    columns:
      - name: bridge_team_identity_sk
        tests:
          - not_null
          - unique
      - name: source_team_id
        tests:
          - not_null
          - unique
      - name: identity_status
        tests:
          - not_null
      - name: local_team_id
        tests:
          - relationships:
              to: ref('dim_team')
              field: team_id
              where: "local_team_id is not null"

  - name: bridge_statsbomb_player_identity
    description: "Ponte de identidade de jogadores StatsBomb para o jogador canonico local quando resolvido."
    columns:
      - name: bridge_player_identity_sk
        tests:
          - not_null
          - unique
      - name: source_player_id
        tests:
          - not_null
          - unique
      - name: identity_status
        tests:
          - not_null
      - name: local_player_id
        tests:
          - relationships:
              to: ref('dim_player')
              field: player_id
              where: "local_player_id is not null"

  - name: dim_statsbomb_event_type
    description: "Dimensao de tipos de evento exposta a partir do feed StatsBomb."
    columns:
      - name: event_type_sk
        tests:
          - not_null
          - unique
      - name: event_type
        tests:
          - not_null
          - unique

  - name: fact_statsbomb_match_event
    description: "Fato de eventos StatsBomb fora da trilha canonica de eventos SportMonks."
    columns:
      - name: statsbomb_match_event_id
        tests:
          - not_null
          - unique
      - name: source_match_id
        tests:
          - not_null
      - name: source_event_id
        tests:
          - not_null
      - name: event_type_sk
        tests:
          - relationships:
              to: ref('dim_statsbomb_event_type')
              field: event_type_sk
              where: "event_type_sk is not null"
      - name: local_match_id
        tests:
          - relationships:
              to: ref('fact_matches')
              field: match_id
              where: "local_match_id is not null"

  - name: fact_statsbomb_lineup_slot
    description: "Fato de slots taticos por jogador a partir dos lineups StatsBomb."
    columns:
      - name: statsbomb_lineup_slot_id
        tests:
          - not_null
          - unique
      - name: source_match_id
        tests:
          - not_null
      - name: source_team_id
        tests:
          - not_null
      - name: source_player_id
        tests:
          - not_null

  - name: fact_statsbomb_360_freeze_frame
    description: "Fato de freeze-frame 360 associado ao evento StatsBomb."
    columns:
      - name: statsbomb_360_freeze_frame_id
        tests:
          - not_null
          - unique
      - name: source_match_id
        tests:
          - not_null
      - name: source_event_id
        tests:
          - not_null

  - name: fact_statsbomb_shot
    description: "Recorte de finalizacoes a partir do fato de eventos StatsBomb."
    columns:
      - name: statsbomb_match_event_id
        tests:
          - not_null
          - unique

  - name: fact_statsbomb_pass
    description: "Recorte de passes a partir do fato de eventos StatsBomb."
    columns:
      - name: statsbomb_match_event_id
        tests:
          - not_null
          - unique

  - name: fact_statsbomb_carry
    description: "Recorte de conducoes a partir do fato de eventos StatsBomb."
    columns:
      - name: statsbomb_match_event_id
        tests:
          - not_null
          - unique

  - name: fact_statsbomb_pressure
    description: "Recorte de pressoes a partir do fato de eventos StatsBomb."
    columns:
      - name: statsbomb_match_event_id
        tests:
          - not_null
          - unique

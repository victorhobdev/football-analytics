services:

  postgres:
    image: postgres:16
    container_name: football_postgres
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=10000
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - postgres_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - football-postgres

  dbmate:
    image: ghcr.io/amacneil/dbmate:2
    container_name: football_dbmate
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      DBMATE_MIGRATIONS_DIR: /db/migrations
    secrets:
      - postgres_password
    volumes:
      - ./db/migrations:/db/migrations
    entrypoint:
      - /bin/sh
      - -lc
    command: >
      export DATABASE_URL="postgres://$${POSTGRES_USER}:$$(cat /run/secrets/postgres_password)@postgres:5432/$${POSTGRES_DB}?sslmode=disable";
      dbmate --wait --migrations-dir "$${DBMATE_MIGRATIONS_DIR}" up
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: football_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  airflow-init:
    build:
      context: .
      dockerfile: infra/airflow/Dockerfile
    image: football-airflow:local
    container_name: football_airflow_init
    depends_on:
      postgres:
        condition: service_started
      dbmate:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "false"
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      APIFOOTBALL_BASE_URL: ${APIFOOTBALL_BASE_URL}
      ACTIVE_PROVIDER: ${ACTIVE_PROVIDER:-sportmonks}
      SPORTMONKS_DEFAULT_LEAGUE_ID: ${SPORTMONKS_DEFAULT_LEAGUE_ID:-648}
      SPORTMONKS_DEFAULT_SEASON: ${SPORTMONKS_DEFAULT_SEASON:-2024}
      APIFOOTBALL_DEFAULT_LEAGUE_ID: ${APIFOOTBALL_DEFAULT_LEAGUE_ID:-71}
      APIFOOTBALL_DEFAULT_SEASON: ${APIFOOTBALL_DEFAULT_SEASON:-2024}
      INGEST_FIXTURES_REQUESTS_PER_MINUTE: ${INGEST_FIXTURES_REQUESTS_PER_MINUTE:-0}
      INGEST_STATISTICS_REQUESTS_PER_MINUTE: ${INGEST_STATISTICS_REQUESTS_PER_MINUTE:-0}
      INGEST_EVENTS_REQUESTS_PER_MINUTE: ${INGEST_EVENTS_REQUESTS_PER_MINUTE:-0}
      SPORTMONKS_BASE_URL: ${SPORTMONKS_BASE_URL:-https://api.sportmonks.com/v3/football}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - airflow_admin_password
      - airflow_database_sql_alchemy_conn
      - airflow_fernet_key
      - airflow_webserver_secret_key
      - apifootball_api_key
      - minio_access_key
      - minio_secret_key
      - postgres_password
      - sportmonks_api_key
    volumes:
      - ./infra/airflow/load_runtime_secrets.sh:/opt/airflow/load_runtime_secrets.sh:ro
    entrypoint:
      - /bin/bash
      - -lc
    command: >
      bash /opt/airflow/load_runtime_secrets.sh bash -lc
      'if [ -z "$${AIRFLOW__CORE__FERNET_KEY}" ]; then
        echo "AIRFLOW__CORE__FERNET_KEY obrigatoria (nao vazia).";
        exit 1;
      fi;
      if [ -z "$${AIRFLOW_ADMIN_PASSWORD}" ] || [ "$${AIRFLOW_ADMIN_PASSWORD}" = "change_me_airflow_admin_password" ]; then
        echo "Defina AIRFLOW_ADMIN_PASSWORD com valor seguro.";
        exit 1;
      fi;
      airflow db init &&
      airflow users create
      --username "$${AIRFLOW_ADMIN_USERNAME}"
      --password "$${AIRFLOW_ADMIN_PASSWORD}"
      --firstname "$${AIRFLOW_ADMIN_FIRSTNAME}"
      --lastname "$${AIRFLOW_ADMIN_LASTNAME}"
      --role Admin
      --email "$${AIRFLOW_ADMIN_EMAIL}"'

  airflow-webserver:
    image: football-airflow:local
    container_name: football_airflow_webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "false"
      PYTHONPATH: /opt/airflow:/opt/airflow/dags
      APIFOOTBALL_BASE_URL: ${APIFOOTBALL_BASE_URL}
      ACTIVE_PROVIDER: ${ACTIVE_PROVIDER:-sportmonks}
      SPORTMONKS_DEFAULT_LEAGUE_ID: ${SPORTMONKS_DEFAULT_LEAGUE_ID:-648}
      SPORTMONKS_DEFAULT_SEASON: ${SPORTMONKS_DEFAULT_SEASON:-2024}
      APIFOOTBALL_DEFAULT_LEAGUE_ID: ${APIFOOTBALL_DEFAULT_LEAGUE_ID:-71}
      APIFOOTBALL_DEFAULT_SEASON: ${APIFOOTBALL_DEFAULT_SEASON:-2024}
      INGEST_FIXTURES_REQUESTS_PER_MINUTE: ${INGEST_FIXTURES_REQUESTS_PER_MINUTE:-0}
      INGEST_STATISTICS_REQUESTS_PER_MINUTE: ${INGEST_STATISTICS_REQUESTS_PER_MINUTE:-0}
      INGEST_EVENTS_REQUESTS_PER_MINUTE: ${INGEST_EVENTS_REQUESTS_PER_MINUTE:-0}
      SPORTMONKS_BASE_URL: ${SPORTMONKS_BASE_URL:-https://api.sportmonks.com/v3/football}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - airflow_database_sql_alchemy_conn
      - airflow_fernet_key
      - airflow_webserver_secret_key
      - apifootball_api_key
      - minio_access_key
      - minio_secret_key
      - postgres_password
      - sportmonks_api_key
    volumes:
      - ./infra/airflow/load_runtime_secrets.sh:/opt/airflow/load_runtime_secrets.sh:ro
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./platform/dbt:/opt/airflow/dbt
      - ./platform/quality:/opt/airflow/quality
    ports:
      - "127.0.0.1:8080:8080"
    entrypoint:
      - /bin/bash
      - -lc
    command: bash /opt/airflow/load_runtime_secrets.sh airflow webserver

  airflow-scheduler:
    image: football-airflow:local
    container_name: football_airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__ENABLE_XCOM_PICKLING: "false"
      PYTHONPATH: /opt/airflow:/opt/airflow/dags
      APIFOOTBALL_BASE_URL: ${APIFOOTBALL_BASE_URL}
      ACTIVE_PROVIDER: ${ACTIVE_PROVIDER:-sportmonks}
      SPORTMONKS_DEFAULT_LEAGUE_ID: ${SPORTMONKS_DEFAULT_LEAGUE_ID:-648}
      SPORTMONKS_DEFAULT_SEASON: ${SPORTMONKS_DEFAULT_SEASON:-2024}
      APIFOOTBALL_DEFAULT_LEAGUE_ID: ${APIFOOTBALL_DEFAULT_LEAGUE_ID:-71}
      APIFOOTBALL_DEFAULT_SEASON: ${APIFOOTBALL_DEFAULT_SEASON:-2024}
      INGEST_FIXTURES_REQUESTS_PER_MINUTE: ${INGEST_FIXTURES_REQUESTS_PER_MINUTE:-0}
      INGEST_STATISTICS_REQUESTS_PER_MINUTE: ${INGEST_STATISTICS_REQUESTS_PER_MINUTE:-0}
      INGEST_EVENTS_REQUESTS_PER_MINUTE: ${INGEST_EVENTS_REQUESTS_PER_MINUTE:-0}
      SPORTMONKS_BASE_URL: ${SPORTMONKS_BASE_URL:-https://api.sportmonks.com/v3/football}
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    secrets:
      - airflow_database_sql_alchemy_conn
      - airflow_fernet_key
      - airflow_webserver_secret_key
      - apifootball_api_key
      - minio_access_key
      - minio_secret_key
      - postgres_password
      - sportmonks_api_key
    volumes:
      - ./infra/airflow/load_runtime_secrets.sh:/opt/airflow/load_runtime_secrets.sh:ro
      - ./infra/airflow/dags:/opt/airflow/dags
      - ./platform/dbt:/opt/airflow/dbt
      - ./platform/quality:/opt/airflow/quality
    entrypoint:
      - /bin/bash
      - -lc
    command: bash /opt/airflow/load_runtime_secrets.sh airflow scheduler

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT_URL: ${MINIO_ENDPOINT_URL}
    secrets:
      - minio_access_key
      - minio_secret_key
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local \"$${MINIO_ENDPOINT_URL}\" \"$$(cat /run/secrets/minio_access_key)\" \"$$(cat /run/secrets/minio_secret_key)\";
      mc mb --ignore-existing local/football-bronze;
      mc mb --ignore-existing local/football-silver;
      exit 0;
      "

  metabase:
    image: metabase/metabase:v0.60.2.5
    container_name: football_metabase
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - metabase_data:/metabase.db
    environment:
      MB_DB_FILE: /metabase.db/metabase


volumes:
  postgres_data:
  minio_data:
  metabase_data:

secrets:
  airflow_admin_password:
    environment: AIRFLOW_ADMIN_PASSWORD
  airflow_database_sql_alchemy_conn:
    environment: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
  airflow_fernet_key:
    environment: AIRFLOW__CORE__FERNET_KEY
  airflow_webserver_secret_key:
    environment: AIRFLOW__WEBSERVER__SECRET_KEY
  apifootball_api_key:
    environment: APIFOOTBALL_API_KEY
  minio_access_key:
    environment: MINIO_ACCESS_KEY
  minio_root_password:
    environment: MINIO_ROOT_PASSWORD
  minio_root_user:
    environment: MINIO_ROOT_USER
  minio_secret_key:
    environment: MINIO_SECRET_KEY
  postgres_password:
    environment: POSTGRES_PASSWORD
  sportmonks_api_key:
    environment: API_KEY_SPORTMONKS

networks:
  default:
    name: football-network

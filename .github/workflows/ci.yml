name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:api:infra/airflow/dags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt pytest==8.3.5 pytest-asyncio==0.24.0 httpx==0.28.1 requests==2.32.5
      - name: Compile Python sources
        run: python -m compileall -q api/src infra/airflow/dags
      - name: Run API tests
        run: python -m pytest -q -p no:cacheprovider api/tests tests

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt
        run: python -m pip install dbt-core==1.8.8 dbt-postgres==1.8.2
      - name: Parse dbt project
        run: dbt parse --project-dir platform/dbt --profiles-dir platform/dbt --no-partial-parse

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck frontend
        run: pnpm typecheck

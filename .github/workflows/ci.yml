name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:api:infra/airflow/dags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            api/requirements.txt
            infra/airflow/requirements.txt
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r api/requirements.txt -r infra/airflow/requirements.txt pytest==8.3.5 pytest-asyncio==0.24.0 httpx==0.28.1 requests==2.32.5
      - name: Compile Python sources
        run: python -m compileall -q api/src infra/airflow/dags
      - name: Run API tests
        run: python -m pytest -q -p no:cacheprovider api/tests tests

  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dbt
        run: python -m pip install dbt-core==1.8.8 dbt-postgres==1.8.2
      - name: Check tracked sensitive configuration
        run: |
          python - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          tracked = subprocess.run(
              ["git", "ls-files"], check=True, capture_output=True, text=True
          ).stdout.splitlines()
          sensitive = []
          for path in tracked:
              name = Path(path).name.lower()
              if name in {".env", ".env.local", ".env.production", "credentials.json"}:
                  sensitive.append(path)
              if name.startswith(".env.") and name != ".env.example":
                  sensitive.append(path)
          if sensitive:
              raise SystemExit("sensitive configuration is tracked: " + ", ".join(sorted(set(sensitive))))

          profile = Path("platform/dbt/profiles.yml").read_text(encoding="utf-8")
          for field in ("host", "port", "user", "pass", "dbname", "schema", "threads"):
              pattern = r"^\s*" + re.escape(field) + r":\s*[\"']?\{\{\s*env_var\("
              if not re.search(pattern, profile, re.MULTILINE):
                  raise SystemExit(f"dbt profile field is not env-backed: {field}")
          PY
      - name: Parse dbt project
        run: dbt parse --project-dir platform/dbt --profiles-dir platform/dbt --no-partial-parse

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck frontend
        run: pnpm typecheck
      - name: Build frontend
        run: pnpm build

  bi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run BI structural tests
        run: python -m unittest -v bi.scripts.test_validate_artifacts
      - name: Validate BI artifacts
        run: python bi/scripts/validate_artifacts.py bi
